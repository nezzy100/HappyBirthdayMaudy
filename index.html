<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine App 💕</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
cursor:none;
}

/* cursor */
.cursor{
position:fixed;
width:20px;
height:20px;
background:radial-gradient(circle,#ff69b4,transparent);
border-radius:50%;
pointer-events:none;
z-index:9999;
}

/* screen */

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transform:translateY(40px);
transition:.6s;
}

.screen.active{
opacity:1;
transform:translateY(0);
}

/* buttons */

button{
border:none;
cursor:pointer;
}

.yes-btn{
font-size:2rem;
padding:20px 40px;
border-radius:40px;
background:#ff6b9d;
color:white;
}

.no-btn{
position:absolute;
padding:12px 25px;
border-radius:30px;
background:#b8f2e6;
}

/* question */

.card{
background:white;
padding:30px;
border-radius:20px;
width:400px;
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin-top:15px;
}

.next-btn{
margin-top:15px;
background:#ff6b9d;
color:white;
padding:10px 20px;
border-radius:20px;
}

/* summary */

.summary{
background:white;
padding:40px;
border-radius:20px;
max-width:500px;
}

.answer{
margin:10px 0;
padding:12px;
background:#ffe3ec;
border-radius:10px;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- proposal -->
<div class="screen active" id="proposal">
<h1>Will you be my Valentine? 💕</h1>
<br>
<button class="yes-btn" id="yesBtn">YES 💖</button>
<button class="no-btn" id="noBtn">NO 😢</button>
</div>

<!-- celebration -->
<div class="screen" id="celebration">
<h1>YAYYY 💖</h1>
<p>Let's plan our date!</p>
</div>

<!-- q1 -->
<div class="screen" id="q1">
<div class="card">
<h3>Kapan kita ketemu? 📅</h3>
<input type="date" id="dateInput">
<button class="next-btn" data-next="q2">Next</button>
</div>
</div>

<!-- q2 -->
<div class="screen" id="q2">
<div class="card">
<h3>Nonton film apa? 🎬</h3>

<select id="movieInput">
<option value="">Pilih...</option>
<option>Titanic</option>
<option>The Notebook</option>
<option>La La Land</option>
<option>Your Name</option>
<option value="other">Lainnya</option>
</select>

<input id="customMovie" placeholder="Tulis film..." style="display:none">

<button class="next-btn" data-next="q3">Next</button>
</div>
</div>

<!-- q3 -->
<div class="screen" id="q3">
<div class="card">
<h3>Liburan kemana? ✈️</h3>
<input id="travelInput" placeholder="contoh: Bali">
<button class="next-btn" data-next="summary">Finish</button>
</div>
</div>

<!-- summary -->
<div class="screen" id="summary">
<div class="summary">
<h2>Our Plan 💕</h2>

<div id="result"></div>

<button id="saveBtn">Save Memory</button>
</div>
</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

/* =========================
VARIABLES
========================= */

const screens=document.querySelectorAll(".screen")
const yesBtn=document.getElementById("yesBtn")
const noBtn=document.getElementById("noBtn")

const movieInput=document.getElementById("movieInput")
const customMovie=document.getElementById("customMovie")

const dateInput=document.getElementById("dateInput")
const travelInput=document.getElementById("travelInput")

const result=document.getElementById("result")

let answers={
date:"",
movie:"",
travel:""
}

/* =========================
UTILS
========================= */

function showScreen(id){
screens.forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* =========================
CURSOR
========================= */

document.addEventListener("mousemove",e=>{
const cursor=document.getElementById("cursor")
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* =========================
NO BUTTON RUN AWAY
========================= */

document.addEventListener("mousemove",e=>{

const rect=noBtn.getBoundingClientRect()

const dx=e.clientX-(rect.left+rect.width/2)
const dy=e.clientY-(rect.top+rect.height/2)

const distance=Math.sqrt(dx*dx+dy*dy)

if(distance<120){

const maxX=window.innerWidth-100
const maxY=window.innerHeight-50

noBtn.style.left=Math.random()*maxX+"px"
noBtn.style.top=Math.random()*maxY+"px"

}

})

/* =========================
YES CLICK
========================= */

yesBtn.addEventListener("click",()=>{

showScreen("celebration")

setTimeout(()=>{
showScreen("q1")
},2000)

})

/* =========================
MOVIE SELECT
========================= */

movieInput.addEventListener("change",()=>{

if(movieInput.value==="other"){
customMovie.style.display="block"
}else{
customMovie.style.display="none"
answers.movie=movieInput.value
}

})

customMovie.addEventListener("input",()=>{
answers.movie=customMovie.value
})

/* =========================
NEXT BUTTON
========================= */

document.querySelectorAll(".next-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

answers.date=dateInput.value
answers.travel=travelInput.value

const next=btn.dataset.next

if(next==="summary"){
renderSummary()
}

showScreen(next)

})

})

/* =========================
SUMMARY
========================= */

function renderSummary(){

result.innerHTML=`
<div class="answer">📅 Date: ${answers.date||"-"}</div>
<div class="answer">🎬 Movie: ${answers.movie||"-"}</div>
<div class="answer">✈️ Travel: ${answers.travel||"-"}</div>
`

}

/* =========================
SAVE MEMORY
========================= */

document.getElementById("saveBtn").addEventListener("click",()=>{

if(typeof html2canvas==="undefined"){
alert("Screenshot library not loaded")
return
}

html2canvas(document.body).then(canvas=>{

const link=document.createElement("a")
link.download="memory.png"
link.href=canvas.toDataURL()
link.click()

})

})

})

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
    </html>
